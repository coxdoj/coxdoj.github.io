name: Site check
on:
  push:
    branches: [main]
  pull_request:
jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Link checker
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress "./**/*.md" "./**/*.html"
          fail: true
